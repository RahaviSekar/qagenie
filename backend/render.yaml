services:
  - type: web
    name: qa-genie-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: FRONTEND_URL
        sync: false